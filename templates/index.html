<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGROSPHERE — Integrated Farms</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#3B2A1A;color:#fff;text-align:center;position:relative;overflow:hidden;
}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,#2d5a3d 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 0%,#4a3520 0%,transparent 60%);}
.content{position:relative;z-index:1;padding:2rem;max-width:520px}
.logo{font-size:3rem;margin-bottom:1rem}
h1{font-size:clamp(2.5rem,6vw,4rem);font-weight:800;letter-spacing:-1px}
h1 span{color:#EF9F27}
.tagline{font-size:0.85rem;letter-spacing:3px;color:rgba(255,255,255,.4);margin-top:.3rem}
p.sub{font-size:1.05rem;color:rgba(255,255,255,.65);margin:1.2rem 0 2.5rem;font-weight:300}
.btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn{
  padding:.85rem 2rem;border-radius:100px;font-size:1rem;text-decoration:none;
  font-weight:500;transition:all .2s;
}
.btn-primary{background:#1D9E75;color:#fff;border:none;}
.btn-primary:hover{background:#0F6E56;}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.35);}
.btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.08);}
.roles{display:flex;gap:1rem;margin-top:3rem;flex-wrap:wrap;justify-content:center}
.role-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:.4rem 1.1rem;border-radius:100px;font-size:.85rem}
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
    <div class="logo">🌿</div>
    <h1>AGRO<span>SPHERE</span></h1>
    <div class="tagline">INTEGRATED FARMS LTD</div>
    <p class="sub">Connecting farmers with agricultural experts across Uganda — one harvest at a time.</p>

    <div class="btns">
        <a href="{{ url_for('login_page') }}" class="btn btn-outline">Sign In</a>
        <a href="{{ url_for('register_page') }}" class="btn btn-primary">Create Account</a>
        <a href="{{ url_for('register_business_page') }}" class="btn btn-outline">Register Business</a>
    </div>

    <div class="roles">
        <span class="role-pill">🌾 Farmers</span>
        <span class="role-pill">🔬 Experts</span>
        <span class="role-pill">🏢 Businesses</span>
        <span class="role-pill">⚙️ Admins</span>
    </div>
</div>
</body>
</html>
